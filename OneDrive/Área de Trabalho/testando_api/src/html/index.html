<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  
  <!-- SEO básico -->
  <meta name="description" content="Busque informações de empresas pelo CNPJ de forma rápida e gratuita.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>CNPJtor - Busca de CNPJ</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <h1>💼 CNPJtor</h1>
    <p class="subtitle">Busque informações de empresas pelo CNPJ</p>
  </header>

  <main class="container">

    <section class="controls" aria-label="Controles de busca">
      
      <!-- Campo de busca -->
      <label for="inputCNPJ" class="label">Buscar por CNPJ</label>
      <input 
        type="text" 
        id="inputCNPJ" 
        class="input"
        placeholder="Digite o CNPJ (com ou sem pontuação)..."
        aria-label="Campo para buscar empresas pelo CNPJ"
        maxlength="18"
      >

      <!-- Botão -->
      <button id="btnBuscar" class="button">
        Buscar CNPJ
      </button>

      <!-- Status -->
      <p id="status" class="status" role="status" aria-live="polite"></p>

    </section>

    <section class="resultados" aria-label="Informações da empresa">
      <div id="resultado" class="resultado"></div>
    </section>

  </main>

  <footer class="footer">
    <small>Dados obtidos da Brasil API - Projeto de estudo</small>
  </footer>

  <script src="script.js"></script>
</body>
</html>
