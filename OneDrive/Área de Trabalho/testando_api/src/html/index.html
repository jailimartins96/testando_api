<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testando API</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 Testando API</h1>
            <p>Projeto para testar e explorar APIs</p>
        </header>

        <main>
            <section class="content">
                <div class="input-group">
                    <input 
                        type="text" 
                        id="apiUrl" 
                        placeholder="Digite a URL da API"
                        class="input-field"
                    >
                    <button id="sendBtn" class="btn-primary">Enviar Requisição</button>
                </div>

                <div class="response-section">
                    <h2>Resposta:</h2>
                    <pre id="response" class="response-box">Aguardando requisição...</pre>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 Testando API. Todos os direitos reservados.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
